#command: sudo docker compose --build
services:
  app:
    build:
      context: .
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: test
      DB_USER: test
      DB_PASSWORD: "123456"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node init-db.js && npm run dev"

  db:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "12345678"
      MYSQL_DATABASE: test
      MYSQL_USER: test
      MYSQL_PASSWORD: "123456"
    volumes:
      - ./mysqldata:/var/lib/mysql
      - ./conf:/etc/mysql/conf.d
      - ./upload:/var/lib/mysql-files
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s